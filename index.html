<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="greeting-section card">
            <h1 id="greeting">Good Morning</h1>
            <p id="date-time">Tuesday, January 27, 2026</p>
        </div>

        <div class="dashboard-grid">
            <div class="timer-section card">
                <h2>Focus Timer</h2>
                <div id="timer">25:00</div>
                <div class="timer-buttons">
                    <button id="start">Start</button>
                    <button id="stop">Stop</button>
                    <button id="reset">Reset</button>
                </div>
            </div>

            <div class="todo-section card">
                <h2>Tasks</h2>
                <input type="text" id="new-task" placeholder="Add a new task...">
                <button id="add-task">Add</button>
                <ul id="task-list"></ul>
            </div>

            <div class="links-section card">
                <h2>Quick Links</h2>
                <input type="text" id="new-link-name" placeholder="Link name">
                <input type="url" id="new-link-url" placeholder="URL">
                <button class="add-link-btn" id="add-link">Add Link</button>
                <div id="link-list"></div>
            </div>
        </div>
    </div>

    <script src="js/main.js" defer></script>
</body>
</html>
